<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン | ガタフィー</title>
    <meta name="description" content="ガタフィーへ新潟大学のGoogleアカウントでログインする画面です。" />
    <meta property="og:title" content="ログイン | ガタフィー" />
    <meta property="og:description" content="新潟大学生限定のフリマへログイン。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/ログイン画面.png" />
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <img class="hero-logo reveal" src="assets/logo.png" alt="ガタフィーのロゴ" style="margin-inline: auto" />
      <section class="reveal">
        <h1>新大生の「欲しい」が、きっと見つかる。</h1>
        <p class="lead">新潟大学の学生のためのフリマアプリです。</p>
      </section>
      <section class="paint-card login-card reveal">
        <a class="btn btn-outline" style="width: 100%; justify-content: center" href="mypage.html">新潟大学の Google アカウントでログイン</a>
        <div class="info-card" style="margin-top: 24px"><h2>学生のみの非公式団体です</h2><p class="lead">ガタフィーは、新潟大学の学生による学生のための非公式サービスです。</p></div>
        <label class="check-row"><input type="checkbox" /> <span><a href="terms.html">利用規約</a> に同意します</span></label>
        <label class="check-row"><input type="checkbox" /> <span><a href="privacy.html">プライバシーポリシー</a> に同意します</span></label>
        <a class="btn btn-primary" style="width: 100%; margin-top: 22px" href="mypage.html">上記に同意してログイン</a>
      </section>
      <p class="lead" style="margin-top: 28px"><a href="index.html">トップページへ戻る</a></p>
    </main>
    <script src="js/main.js"></script>
  </body>
